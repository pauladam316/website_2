name: Deploy to adampaul.space

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      # copy-blog-assets integration writes blog media (gif, video, etc.) into dist/blog/<slug>/
      - name: Verify blog assets in build output
        run: |
          echo "Blog dirs in dist:"
          ls -la dist/blog 2>/dev/null || true
          echo "Sample blog assets (observatory-build-4):"
          ls -la dist/blog/observatory-build-4 2>/dev/null || true
          count=$(find dist/blog -type f \( -name '*.gif' -o -name '*.GIF' -o -name '*.mov' -o -name '*.MOV' -o -name '*.mp4' -o -name '*.MP4' \) 2>/dev/null | wc -l)
          echo "Blog media files (gif/video) found: $count"
          if [ "$count" -eq 0 ]; then
            echo "::warning::No blog GIF/video assets found in dist/blog - check copy-blog-assets integration"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
